name: voxcrm-production

x-security: &security
  read_only: true
  tmpfs:
    - /tmp:rw,noexec,nosuid,size=64m
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL
  restart: unless-stopped

services:
  postgres:
    image: postgres:16-bookworm@sha256:92620daddcd947f8d5ab5ba66e848702fe443d87fed30c4cea8e389fd78dfc55
    env_file: ${VOXCRM_SECRETS_ENV:-/etc/voxcrm/secrets/production.env}
    environment:
      POSTGRES_INITDB_ARGS: --auth-host=scram-sha-256 --data-checksums
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/10-gateway.sql:ro
    networks: [data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 12
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

  migrate-crm:
    build:
      context: ..
      dockerfile: VoxCrm.Web/Dockerfile
    image: voxcrm-web:${VOXCRM_VERSION:-local}
    env_file: ${VOXCRM_SECRETS_ENV:-/etc/voxcrm/secrets/production.env}
    environment: &dotnet-env
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      DataProtection__KeyPath: /keys
      WhatsAppGateway__BaseUrl: http://gateway-api:8088
      VoxCrmApi__BaseUrl: http://api:8080
      WhatsAppGateway__Issuer: voxcrm-whatsapp-gateway
      WhatsAppGateway__Audience: voxcrm-api
      WhatsAppGateway__GatewayIssuer: voxcrm
      WhatsAppGateway__GatewayAudience: voxcrm-whatsapp-gateway
    command: ["--migrate-only"]
    volumes:
      - data-protection:/keys
      - ${VOXCRM_PII_KEY_FILE:-/etc/voxcrm/secrets/pii.key}:/run/secrets/pii.key:ro
    networks: [data, backend]
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  web:
    <<: *security
    image: voxcrm-web:${VOXCRM_VERSION:-local}
    env_file: ${VOXCRM_SECRETS_ENV:-/etc/voxcrm/secrets/production.env}
    environment: *dotnet-env
    volumes:
      - data-protection:/keys
      - ${VOXCRM_PII_KEY_FILE:-/etc/voxcrm/secrets/pii.key}:/run/secrets/pii.key:ro
    ports:
      - 127.0.0.1:${VOXCRM_WEB_BIND_PORT:-5180}:8080
    networks: [frontend, backend, data]
    depends_on:
      migrate-crm:
        condition: service_completed_successfully
      api:
        condition: service_healthy
      gateway-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "dotnet", "VoxCrm.Web.dll", "--healthcheck"]
      interval: 30s
      timeout: 5s
      retries: 5

  api:
    <<: *security
    build:
      context: ..
      dockerfile: VoxCrm.Api/Dockerfile
    image: voxcrm-api:${VOXCRM_VERSION:-local}
    env_file: ${VOXCRM_SECRETS_ENV:-/etc/voxcrm/secrets/production.env}
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      WhatsAppGateway__ApiIssuer: voxcrm-whatsapp-gateway
      WhatsAppGateway__ApiAudience: voxcrm-api
    networks: [backend, data]
    volumes:
      - ${VOXCRM_PII_KEY_FILE:-/etc/voxcrm/secrets/pii.key}:/run/secrets/pii.key:ro
    depends_on:
      migrate-crm:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "dotnet", "VoxCrm.Api.dll", "--healthcheck"]
      interval: 30s
      timeout: 5s
      retries: 5

  migrate-gateway:
    build:
      context: ../whatsapp-gateway/gateway-api
    image: voxcrm-gateway:${VOXCRM_VERSION:-local}
    env_file: ${VOXCRM_SECRETS_ENV:-/etc/voxcrm/secrets/production.env}
    environment: &gateway-env
      APP_ENVIRONMENT: production
      AUTO_CREATE_DB: "false"
      GATEWAY_DATABASE_URL: postgresql+asyncpg://voxcrm:${POSTGRES_PASSWORD}@postgres:5432/voxcrm_gateway_prod
      WORKER_BASE_URL: http://wa-worker:8090
      VOXCRM_API_BASE_URL: http://api:8080
      WHATSAPP_JWT_SECRET: ${WhatsAppGateway__JwtSecret}
    command: ["alembic", "-c", "alembic.ini", "upgrade", "head"]
    volumes:
      - ${VOXCRM_PII_KEY_FILE:-/etc/voxcrm/secrets/pii.key}:/run/secrets/pii.key:ro
    networks: [data]
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  gateway-api:
    <<: *security
    image: voxcrm-gateway:${VOXCRM_VERSION:-local}
    env_file: ${VOXCRM_SECRETS_ENV:-/etc/voxcrm/secrets/production.env}
    environment: *gateway-env
    networks: [backend, data]
    volumes:
      - ${VOXCRM_PII_KEY_FILE:-/etc/voxcrm/secrets/pii.key}:/run/secrets/pii.key:ro
    depends_on:
      migrate-gateway:
        condition: service_completed_successfully
      wa-worker:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8088/api/health', timeout=3)\""]
      interval: 30s
      timeout: 5s
      retries: 5

  wa-worker:
    <<: *security
    user: "${VOXCRM_HOST_UID:-995}:${VOXCRM_HOST_GID:-986}"
    build:
      context: ../whatsapp-gateway/wa-worker
    image: voxcrm-worker:${VOXCRM_VERSION:-local}
    env_file: ${VOXCRM_SECRETS_ENV:-/etc/voxcrm/secrets/production.env}
    environment:
      NODE_ENV: production
      PORT: 8090
      SESSION_ROOT: /app/sessions
      GATEWAY_INTERNAL_URL: http://gateway-api:8088
    volumes:
      - ${VOXCRM_SESSION_DIR:-/var/lib/voxcrm/whatsapp-sessions}:/app/sessions
    networks: [backend]
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:8090/health',{headers:{'x-internal-token':process.env.WORKER_INTERNAL_TOKEN}}).then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 5

  caddy:
    profiles: [caddy]
    image: caddy:2-alpine@sha256:5f5c8640aae01df9654968d946d8f1a56c497f1dd5c5cda4cf95ab7c14d58648
    env_file: ${VOXCRM_SECRETS_ENV:-/etc/voxcrm/secrets/production.env}
    ports:
      - 80:80
      - 443:443
      - 443:443/udp
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    networks: [frontend]
    depends_on:
      web:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

networks:
  frontend: {}
  backend:
    internal: true
  data:
    internal: true

volumes:
  postgres-data: {}
  data-protection: {}
  caddy-data: {}
  caddy-config: {}
